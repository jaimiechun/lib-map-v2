<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Insecurity Data Collection Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css?v=1784566604" />
</head>
<body>
<div id="app">
  <header id="header">
    <div id="brand">
      <span id="brand-dot"></span>
      <div>
        <h1>Water Insecurity Data Collection</h1>
        <p id="subtitle">Where WISE data has been collected, by country</p>
      </div>
    </div>
    <div id="header-right">
      <div id="stats"></div>
      <button id="submit-open">Submit data</button>
    </div>
  </header>

  <div id="map-wrap">
    <aside id="filter-panel">
      <div id="search-wrap">
        <input type="search" id="search-input" placeholder="Search..." autocomplete="off">
        <button id="search-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
          </svg>
        </button>
        <div id="search-results" class="hidden"></div>
      </div>
      <div class="filter-title">See on map</div>
      <div class="filter-group" data-filter="all">
        <button class="chip active">All Countries <span class="chev"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span></button>
        <div class="tool-list"></div>
      </div>
      <div class="filter-group" data-filter="completed">
        <button class="chip">Completed <span class="chev"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span></button>
        <div class="tool-list"></div>
      </div>
      <div class="filter-group" data-filter="planned">
        <button class="chip">Planned <span class="chev"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span></button>
        <div class="tool-list"></div>
      </div>
      <label class="chip-toggle">
        <input type="checkbox" id="rep-shading" checked>
        Nationally Representative Data
      </label>
    </aside>

    <button id="expand-btn" title="Open in new tab">⤢</button>
    <button id="globe-btn" title="Globe view">🌐</button>

    <div id="map"></div>
    <div id="globe"></div>

    <div id="detail-card" class="hidden">
      <button id="detail-close" aria-label="Close">×</button>
      <div id="detail-content"></div>
    </div>

    <div id="submit-overlay" class="hidden">
      <div id="submit-modal">
        <button id="submit-close" aria-label="Close">×</button>
        <h2>Submit data for review</h2>
        <p class="submit-intro">
          Know of WISE data collection that isn't on this map? Send it to the
          research team. Submissions are reviewed before they appear.
        </p>
        <form id="submit-form">
          <div class="form-row">
            <label>Data level
              <select name="level" required>
                <option value="Site">Site-level</option>
                <option value="National">National</option>
              </select>
            </label>
            <label>Status
              <select name="status" required>
                <option>Completed</option>
                <option>Ongoing</option>
                <option>Planned</option>
              </select>
            </label>
          </div>
          <div class="form-row">
            <label>Country *
              <input name="country" required placeholder="e.g. Kenya">
            </label>
            <label>Tool *
              <select name="tool" required>
                <option>HWISE-12</option>
                <option>HWISE-4</option>
                <option>IWISE-12</option>
                <option>IWISE-4</option>
                <option>Other</option>
              </select>
            </label>
          </div>
          <label>Location / region (for site-level data)
            <input name="location" placeholder="e.g. Kampala, five informal settlements">
          </label>
          <div class="form-row">
            <label>Data collection dates
              <input name="dates" placeholder="e.g. March–July 2025">
            </label>
            <label>Source / survey (for national data)
              <input name="source" placeholder="e.g. Gallup World Poll">
            </label>
          </div>
          <label>Link to more info (paper, report, website)
            <input name="link" type="url" placeholder="https://...">
          </label>
          <label>Contact for this data
            <input name="contact" type="email" placeholder="name@example.org">
          </label>
          <label>Your name &amp; email (so we can follow up) *
            <input name="submitter" required placeholder="Jane Doe, jane@example.org">
          </label>
          <label>Anything else we should know?
            <textarea name="notes" rows="2"></textarea>
          </label>
          <button type="submit" id="submit-send">Send to research team</button>
          <p id="submit-status" class="hidden"></p>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data/countries.js?v=1784566604"></script>
<script src="data/borders.js?v=1784566604"></script>
<script src="data/world.js?v=1784566604"></script>
<script src="app.js?v=1784566604"></script>
</body>
</html>
